)", "garage": "unknown (typical 2-car attached for subdivision - verify)", "ev_charging": "unknown (home has solar panels - panel may support charger)", "facing_direction": "unknown", "distance_to_hub": "~2 mi / 6 min to GVR Resort", "neighborhood_notes": "Green Valley South; two-story, vaulted ceilings, solar panels; near parks/shopping; quiet", "available_date": "2026-07-07", "listing_url": "https://www.zumper.com/listings/28925859p/3-bedroom-green-valley-south-henderson-nv", "source_site": "Zumper (Faranesh RE & PM 702-523-7151)", "lat": 36.025919, "lng": -115.1000203, "first_seen": "2026-07-04"}, {"address": "10215 Cougar Crossing St, Enterprise, NV 89178", "hub": "Durango / Southwest", "type": "house", "monthly_rent": 2305, "rent_note": "", "beds": 3, "baths": 2.5, "sqft": 1703, "year_built": "", "cats_allowed": "yes", "garage": "attached", "ev_charging": "unknown", "facing_direction": "unknown", "distance_to_hub": "4.9 mi / 13 min to Durango Casino", "neighborhood_notes": "Mountain's Edge, cul-de-sac + adjacent walking/biking trails = quiet pocket. Outer-89178 new-build caveat \u2014 verify locally.", "available_date": "2026-07-24", "listing_url": "https://www.zumper.com/listings/13794008p/3-bedroom-mountain-edge-enterprise-nv", "source_site": "Zumper", "lat": 36.003596678161, "lng": -115.281266391465, "first_seen": "2026-07-04"}, {"address": "9256 Wild Stampede Ave, Enterprise, NV 89178", "hub": "Durango / Southwest", "type": "house", "monthly_rent": 2325, "rent_note": "", "beds": 3, "baths": 2.5, "sqft": 1668, "year_built": "", "cats_allowed": "yes", "garage": "attached", "ev_charging": "unknown", "facing_direction": "unknown", "distance_to_hub": "4.7 mi / 12 min to Durango Casino", "neighborhood_notes": "Mountain's Edge master-planned (built ~2005-2015), parks/trails, generally quiet BUT SW edge has some active construction \u2014 drive-by check.", "available_date": "now", "listing_url": "https://www.zumper.com/listings/4968794p/3-bedroom-mountain-edge-ente n", "distance_to_hub": "2.1 mi / 7 min to Durango Casino", "neighborhood_notes": "Rhodes Ranch \u2014 biggest home of the set (4bd/2231sqft). Quiet mature community, fenced yard.", "available_date": "now", "listing_url": "https://www.zumper.com/listings/4804667p/4-bedroom-rhodes-ranch-spring-valley-nv", "source_site": "Zumper", "lat": 36.0944423, "lng": -115.3062086, "first_seen": "2026-07-04"}, {"address": "10296 Magnolia Tree Ave, Las Vegas, NV 89135", "hub": "Red Rock / Summerlin", "type": "house (2-story)", "monthly_rent": 2495, "rent_note": "", "beds": 4, "baths": 2.5, "sqft": 2032, "year_built": "", "cats_allowed": "yes ('Pets considered with pet deposit')", "garage": "unknown (typical attached 2-car for tract)", "ev_charging": "unknown", "facing_direction": "unknown", "distance_to_hub": "~1.1 mi / 4 min to Red Rock Casino", "neighborhood_notes": "Corner lot across from park w/ playground; near top Summerlin schools; newly remodeled; quiet family area", "available_date": "now", "listing_url": "https://www.zumper.com/listings/4282159p/4-bedroom-mira-villas-las-vegas-nv", "source_site": "Zumper", "lat": 36.147339178119, "lng": -115.318175795201, "first_seen": "2026-07-04"}];
const HUBS = [{"name": "Red Rock Casino", "lat": 36.1587, "lng": -115.3324}, {"name": "Durango Casino", "lat": 36.074, "lng": -115.279}, {"name": "Green Valley Ranch / The District", "lat": 36.0397, "lng": -115.0819}];
const COLORS = {"Red Rock / Summerlin": "#C2410C", "Durango / Southwest": "#1D4ED8", "Green Valley Ranch": "#047857"};
const API = "https://script.google.com/macros/s/AKfycbyM9AfjLPZ8J2kQD75gKrI2yy_3DCtWmV8-9lakJfojFa9ZLPef46uZMQz9bxxXSGbr/exec";
const TODAY = "2026-07-04";
const NEW_DAYS = 3;

let FB = {};          // address -> {seen, hidden, up:[], down:[]}
let showHidden = false;
let markers = {};

function who() {
  let w = localStorage.getItem('rental_who');
  if (!w) {
    w = prompt("Who's using this? (so feedback is attributed)", "Kingsley") || "?";
    localStorage.setItem('rental_who', w);
  }
  return w;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2200);
}
async function apiLog(address, type, reason) {
  if (!API) { toast('Feedback backend not deployed yet'); return false; }
  const u = API + '?action=log&address=' + encodeURIComponent(address) +
    '&type=' + type + '&reason=' + encodeURIComponent(reason || '') +
    '&who=' + encodeURIComponent(who());
  try { await fetch(u); return true; }
  catch (e) { toast('Could not save feedback'); return false; }
}
function isNew(r) {
  if (!r.first_seen) return false;
  const days = (new Date(TODAY) - new Date(r.first_seen)) / 86400000;
  return days <= NEW_DAYS && !(FB[r.address] || {}).seen;
}
function fbState(r) { return FB[r.address] || { seen: false, hidden: false, up: [], down: [] }; }

const map = L.map('map', { zoomControl: true }).setView([36.08, -115.2], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
}).addTo(map);

HUBS.forEach(h => {
  L.circle([h.lat, h.lng], { radius: 4828, color: '#1C1B1A', weight: 1,
    opacity: 0.25, fillOpacity: 0.03, dashArray: '4 6' }).addTo(map);
  L.circleMarker([h.lat, h.lng], { radius: 4, color: '#1C1B1A', fillColor: '#1C1B1A',
    fillOpacity: 1 }).addTo(map).bindTooltip(h.name, { permanent: true, direction: 'top',
    offset: [0, -8], className: 'hub-tip' });
});

function badge(label, val) {
  const v = (val || 'unknown').toLowerCase();
  const cls = v.startsWith('yes') ? 'yes' : (v.startsWith('unknown') || v === '' ? 'unk' : '');
  return `<span class="badge ${cls}">${label}: ${v.split('(')[0].trim()}</span>`;
}

function popupHtml(r, i) {
  const s = fbState(r);
  const gmaps = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(r.address);
  const upN = s.up.length ? ` ${s.up.length}` : '';
  return `<div class="pop" data-i="${i}">
    <div class="rent">$${r.monthly_rent.toLocaleString()}<span style="font-weight:400;color:#6B6864;font-size:12px"> /mo${r.sqft ? ' · $' + (r.monthly_rent/r.sqft).toFixed(2) + '/sqft' : ''}</span></div>
    <div class="addr">${r.address}</div>
    <div class="row"><b>${r.beds}bd ${r.baths}ba</b> · ${r.sqft ? r.sqft.toLocaleString() + ' sqft · ' : ''}${r.type}</div>
    <div class="row">🐱 ${r.cats_allowed || '?'} &nbsp; 🚗 ${r.garage || '?'}</div>
    <div class="row">⚡ EV: ${r.ev_charging || '?'} &nbsp; 📍 ${r.distance_to_hub || ''}</div>
    <div class="links">
      <a href="${r.listing_url}" target="_blank">Listing →</a>
      <a href="${gmaps}" target="_blank">Maps →</a>
    </div>
    <div class="fb-bar">
      <button class="fb-btn ${s.up.length ? 'active-up' : ''}" onclick="openForm(${i},'up')">👍${upN}</button>
      <button class="fb-btn ${s.down.length ? 'active-down' : ''}" onclick="openForm(${i},'down')">👎</button>
      <button class="fb-btn" onclick="doHide(${i})">${s.hidden ? 'Unhide' : 'Hide'}</button>
    </div>
    <div class="fb-form" id="form-${i}">
      <textarea id="reason-${i}" placeholder=""></textarea>
      <button class="fb-submit" onclick="submitFb(${i})">Save</button>
    </div>
    <div class="fb-note" id="note-${i}">${s.up.map(u => '👍 ' + (u.who||'') + ': ' + u.reason).concat(s.down.map(d => '👎 ' + (d.who||'') + ': ' + d.reason)).join('<br>')}</div>
  </div>`;
}

let pendingType = {};
function openForm(i, type) {
  pendingType[i] = type;
  const f = document.getElementById('form-' + i);
  f.style.display = 'block';
  const ta = document.getElementById('reason-' + i);
  ta.placeholder = type === 'up'
    ? "What makes this one good? (helps expand the search — e.g. 'love single-story', 'this street is quiet')"
    : "What's wrong with it? (disqualifies similar ones — e.g. 'too far from hub', 'no yard', 'busy road')";
  ta.focus();
}
async function submitFb(i) {
  const r = LISTINGS[i];
  const type = pendingType[i];
  const reason = document.getElementById('reason-' + i).value.trim();
  if (!reason) { toast('Add a quick reason — it trains the search'); return; }
  const ok = await apiLog(r.address, type, reason);
  if (!ok) return;
  const s = fbState(r);
  if (type === 'up') s.up.push({ reason, who: who() });
  if (type === 'down') { s.down.push({ reason, who: who() }); s.hidden = true; }
  FB[r.address] = s;
  toast(type === 'up' ? 'Saved — search will look for more like this' : 'Saved & hidden — search will avoid this');
  render();
}
async function doHide(i) {
  const r = LISTINGS[i];
  const s = fbState(r);
  const type = s.hidden ? 'unhide' : 'hide';
  const ok = await apiLog(r.address, type, '');
  if (!ok) return;
  s.hidden = !s.hidden;
  FB[r.address] = s;
  toast(s.hidden ? 'Hidden' : 'Restored');
  render();
}
async function markSeen(r) {
  const s = fbState(r);
  if (s.seen) return;
  s.seen = true; FB[r.address] = s;
  apiLog(r.address, 'seen', '');
  // don't re-render here — it would destroy the just-opened popup.
  // Just refresh the sidebar card pills in place.
  refreshPills();
}
function refreshPills() {
  document.querySelectorAll('.card').forEach(el => {
    const i = el.dataset.i;
    if (i === undefined) return;
    const r = LISTINGS[i], s = fbState(r);
    const pillEl = el.querySelector('.rent span');
    const pill = isNew(r) ? '<span class="pill-new">NEW</span>'
      : (s.up.length ? '<span class="pill-liked">👍 liked</span>'
      : (s.seen ? '<span class="pill-seen">seen</span>' : '<span></span>'));
    if (pillEl) pillEl.outerHTML = pill;
  });
}

function render() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const list = document.getElementById('list');
  list.innerHTML = '';
  const byHub = {};
  LISTINGS.forEach((r, i) => {
    const s = fbState(r);
    if (s.hidden && !showHidden) return;
    (byHub[r.hub] = byHub[r.hub] || []).push([r, i]);
  });
  Object.keys(byHub).forEach(hub => {
    const lbl = document.createElement('div');
    lbl.className = 'zone-label'; lbl.textContent = hub + ' · ' + byHub[hub].length;
    list.appendChild(lbl);
    byHub[hub].forEach(([r, i]) => {
      const s = fbState(r);
      const c = COLORS[r.hub] || '#666';
      const m = L.circleMarker([r.lat, r.lng], {
        radius: isNew(r) ? 11 : 9,
        color: isNew(r) ? '#1C1B1A' : '#FAF9F7',
        weight: 2, fillColor: c, fillOpacity: s.hidden ? 0.35 : 0.95
      }).addTo(map);
      m.bindPopup(() => popupHtml(r, i), { maxWidth: 300 });
      m.on('popupopen', () => markSeen(r));
      markers[i] = m;

      const d = document.createElement('div');
      d.className = 'card' + (s.hidden ? ' is-hidden' : '');
      d.dataset.i = i;
      d.style.borderLeftColor = c;
      const pill = isNew(r) ? '<span class="pill-new">NEW</span>'
        : (s.up.length ? '<span class="pill-liked">👍 liked</span>'
        : (s.seen ? '<span class="pill-seen">seen</span>' : '<span></span>'));
      d.innerHTML = `<div class="rent">$${r.monthly_rent.toLocaleString()} ${pill}</div>
        <div class="addr">${r.address.split(',')[0]}</div>
        <div class="specs">${r.beds}bd ${r.baths}ba${r.sqft ? ' · ' + r.sqft.toLocaleString() + ' sqft' : ''}</div>
        <div class="badges">${badge('cats', r.cats_allowed)}${badge('garage', (r.garage||'').includes('attached') ? 'yes, attached' : r.garage)}</div>`;
      d.onclick = () => { map.setView([r.lat, r.lng], 15); m.openPopup(); };
      list.appendChild(d);
    });
  });
}

document.getElementById('toggleHidden').onclick = function () {
  showHidden = !showHidden;
  this.textContent = showHidden ? 'hide hidden' : 'show hidden';
  render();
};

const legend = document.getElementById('legend');
legend.innerHTML = Object.entries(COLORS).map(([h, c]) =>
  `<div class="item"><span class="dot" style="background:${c}"></span>${h}</div>`).join('') +
  '<div class="item" style="color:#6B6864;margin-top:6px">◌ ring = 3 mi · dark outline = new</div>';

async function init() {
  if (API) {
    try {
      const res = await fetch(API);
      FB = await res.json();
    } catch (e) { console.warn('feedback fetch failed', e); }
  }
  render();
}
init();
</script>
</body>
</html>
